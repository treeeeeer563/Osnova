name: Build Payload DEX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
      
      - name: Download AndroidX Core
        run: |
          wget https://repo1.maven.org/maven2/androidx/core/core/1.12.0/core-1.12.0.aar
          unzip core-1.12.0.aar -d core
      
      - name: Compile Payload
        run: |
          javac -cp "$ANDROID_HOME/platforms/android-34/android.jar:core/classes.jar" -d . Main.java
      
      - name: Convert to DEX
        run: |
          $ANDROID_HOME/build-tools/34.0.0/d8 --lib "$ANDROID_HOME/platforms/android-34/android.jar" --classpath core/classes.jar --output . com/payload/Main.class
          mv classes.dex payload.dex
      
      - name: Upload Payload
        uses: actions/upload-artifact@v4
        with:
          name: payload
          path: payload.dex
